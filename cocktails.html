  <script>
  (() => {
    const BARS = {
      shanghai: [
        {name:"Speak Low",tag:"Speakeasy",desc:"后藤健太郎（Shingo Gokan）主理，亚洲/世界50佳常客。藏在调酒器材店后面的三层空间：一楼是热闹的经典鸡尾酒吧，二楼提供稀有烈酒和精致调酒，三楼是极私密的隐藏房间。",sig:["Speak Low（招牌同名，白兰地+雪莉+苦精）","各楼层风格完全不同，建议从一楼喝到三楼"],map:"Speak+Low+Bar+Shanghai+Fuxing"},
        {name:"Sober Company",tag:"四合一概念",desc:"Cross Yu 主理。四个空间合一：楼下是低酒精轻松吧，Tipsy 是主力派对区，还有精酿啤酒和日式小食吧。鸡尾酒与食物 pairing 做得非常出色。2024亚洲50佳 #92。",sig:["季节限定创意鸡尾酒","日式居酒屋小食配酒"],map:"Sober+Company+Bar+Shanghai"},
        {name:"Epic",tag:"外滩景观",desc:"外滩绝佳位置，夜景+顶级调酒。2025亚洲50佳 #74。适合约会或庆祝的高端场合。",sig:["外滩系列景观特调","季节性水果鸡尾酒"],map:"Epic+Bar+Shanghai+Bund"},
        {name:"Bar No.3",tag:"经典主义",desc:"老上海风情空间，专注把经典鸡尾酒做到极致。不追求花哨，胜在每一杯的稳定和细腻。安静坐下来喝一杯 Old Fashioned 的好地方。",sig:["Old Fashioned","Martini","Negroni"],map:"Bar+No.3+Shanghai"},
        {name:"COA Shanghai",tag:"龙舌兰专门",desc:"来自香港的 Jay Khan，COA 曾连续三年蝉联亚洲最佳酒吧。上海店是四层楼的 agave spirits 殿堂，从梅斯卡尔到龙舌兰应有尽有。2025亚洲50佳 #85。",sig:["Oaxacan Old Fashioned","梅斯卡尔 flight 品鉴"],map:"COA+Shanghai+bar"},
        {name:"Penicillin Shanghai",tag:"可持续创新",desc:"2025年5月从香港登陆上海南昌路。以可持续和高科技闻名——旋转蒸发器、离心机、分子料理手法。50%酒单与香港同步，50%用上海本地 upcycled 食材创作。亚洲50佳 #27（香港店）。",sig:["The Original（牡蛎壳蒸馏伏特加+番茄+椰子水）","季节本地食材限定款"],map:"Penicillin+Shanghai+Nanchang+Road"},
        {name:"Bar Leone Shanghai",tag:"世界冠军",desc:"2025年空降上海思南公馆。母店 Bar Leone Hong Kong 连续两年蝉联亚洲最佳酒吧、2025世界50佳 #1。Lorenzo Antinori 主理，走意大利经典路线，理念是 Cocktail Popolari——为大众而调的鸡尾酒。",sig:["Garibaldi（金巴利+鲜榨橙汁）","意式 Spritz 系列"],map:"Bar+Leone+Shanghai+Sinan+Mansions"},
        {name:"Pony Up",tag:"本土新星",desc:"Dre Yang 主理，致敬马匹的高能量内饰。上海本土酒吧首次登上亚洲50佳（2025 #97），氛围好、调酒有趣、适合和朋友热闹地喝。",sig:["Pony Up Highball","季节限定创作"],map:"Pony+Up+Bar+Shanghai"},
        {name:"El Coctel",tag:"开创者",desc:"加泰罗尼亚主厨 Willy Trullas Moreno 在永福路开的西班牙风情酒吧，是上海精品鸡尾酒的拓荒者之一，影响了整整一代本地酒吧。二楼空间复古迷人，调酒大胆有个性。推荐理由：想理解上海鸡尾酒从哪里来，这里是绕不开的起点。",sig:["招牌西班牙风味创意特调","经久不衰的老派创作"],map:"El+Coctel+Bar+Shanghai+Yongfu+Road"},
        {name:"The Union Trading Company",tag:"经典改良",desc:"富民路上的老牌实力派，曾登上亚洲50佳。主打对经典鸡尾酒的精彩改良，吧台功底扎实、服务热情。推荐理由：'把经典做到极好'这一派的上海代表，喝杯稳的就来这。",sig:["Mr. & Mrs. Smith","Tiki 风格特调"],map:"Union+Trading+Company+Bar+Shanghai+Fumin+Road"},
        {name:"Senator Saloon",tag:"复古美式",desc:"复刻美国禁酒令前的老派沙龙，专长 Julep、Cobbler 等古典长饮与陈年烈酒。复古皮革与黄铜空间。推荐理由：想喝有年代感、慢节奏的古典美式鸡尾酒，氛围拉满。",sig:["Mint Julep","Sherry Cobbler","陈年威士忌"],map:"Senator+Saloon+Bar+Shanghai"},
        {name:"The Nest",tag:"外滩·北欧",desc:"外滩边的北欧风格餐酒吧，以阿夸维特（Aquavit）和金酒为特色，落地窗正对浦江夜景。推荐理由：景观、社交、生蚝配酒一次满足，约会和招待外地朋友的好牌面。",sig:["Aquavit 系列特调","金酒鸡尾酒配生蚝"],map:"The+Nest+Bar+Shanghai+Bund"},
        {name:"Constellation（酒池星座）",tag:"日式·无菜单",desc:"上海日式酒吧的代表，多家分店。没有花哨噱头，强调经典技法与待客之道——报口味，由酒保为你定制。推荐理由：想安静喝一杯标准之上的经典、看手工冰雕，这里最稳。",sig:["按口味定制的经典鸡尾酒","手工冰雕 Highball"],map:"Constellation+Bar+Shanghai+Yongkang+Road"},
        {name:"Bar Bud",tag:"当红·首尔×上海",desc:"永福路 The Merchants 二楼的设计型 speakeasy，由首尔名吧 Bar Cham（亚洲50佳 #20）与 The Merchants 联手。吧台里嵌着韩式炭火炉，酒单'The Destinations'用12杯致敬首尔与上海的街头味道，喝满5杯还送一碗'醉汉'韩式拉面。推荐理由：当下最热的新店之一，调酒有想法、服务利落、氛围松弛不端着。",sig:["Lai Lai（致敬小笼包的招牌）","首尔×上海主题创意鸡尾酒","韩式炭火小食配酒"],map:"Bar+Bud+The+Merchants+Yongfu+Road+Shanghai"},
        {name:"Mi Shang · Prada 荣宅",tag:"洋房·时装×调酒",desc:"Prada 修复的百年荣宅花园洋房里的酒吧，中意融合酒单由名调酒师 Remy Savage（伦敦 A Bar with Shapes for a Name）操刀。推荐理由：把时装、历史建筑与高水准调酒揉在一起，环境美到不真实，适合有仪式感的场合。",sig:["中意融合概念特调","荣宅季节限定酒单"],map:"Prada+Rong+Zhai+Bar+Shanghai"},
        {name:"酿青 Niang Qing",tag:"中医·开方",desc:"大学路上的中医主题酒吧，进门像看诊——'郎中'按你的体质和心情'开方'，再调一杯对症的草本鸡尾酒，当归、陈皮、桂圆等本草入酒。推荐理由：概念新奇、互动有趣，东方风味鲜明，想喝点别处没有的就来。",sig:["按'体质'定制的草本药方鸡尾酒","当归/陈皮/桂圆等本草特调"],map:"Niang+Qing+Bar+Shanghai+Daxue+Road"},
        {name:"Botanik",tag:"可持续·植物",desc:"以可持续与植物风味为主题的创意酒吧，香草、果皮、根茎入酒，零浪费理念贯穿整张酒单。推荐理由：想喝得清新、健康向、低负担又有巧思，这里很难得。",sig:["植物系低酒精特调","零浪费在地食材鸡尾酒"],map:"Botanik+Bar+Shanghai"},
        {name:"Logan's Punch",tag:"音乐·热闹",desc:"以黑胶音乐和大碗潘趣（Punch）著称的派对型酒吧，氛围轻松不装腔。推荐理由：和一群朋友热闹地喝、跟着音乐摇摆的首选，分享装 Punch 很上头。",sig:["分享装 Punch Bowl","节奏感十足的派对夜"],map:"Logans+Punch+Bar+Shanghai"},
        {name:"The Tuxedo",tag:"后现代经典",desc:"瑞金二路转角的低调名店，由 COA 出身、2022 年 That's Shanghai 年度调酒师 Robin Leung 主理。以同名鸡尾酒 Tuxedo（马天尼的近亲，藏一缕苦艾酒）为轴，酒单像太极图分成五区：后现代经典、改良、传世经典、被遗忘的经典与'上海经典'。1920年代秘密俱乐部气场，深木、皮革、黄铜。推荐理由：想认真喝马天尼一脉与经典改良、又要格调，这里是上海第一梯队。",sig:["The Tuxedo（招牌，含苦艾酒）","Shanghai Cocktail / #310（老上海风）","龙舌兰风格改良经典"],map:"The+Tuxedo+Bar+Ruijin+Road+Shanghai"},
        {name:"Asian Flush",tag:"亚洲风味·实验",desc:"名字调侃'亚洲红脸'，整间店是对亚洲食材的致敬：榴莲蒸馏液、白味噌、四川乌龙、泰式茶、斑斓苏打，全部用自创的'风味重构系统'做出来，配中式招牌视觉与深红装潢。推荐理由：想喝到别处没有的亚洲风味实验、又不失水准，这家很对味。",sig:["榴莲/白味噌等亚洲食材特调","'风味重构系统'出品的招牌"],map:"Asian+Flush+Bar+Shanghai"},
        {name:"Tribeca",tag:"露台·社交",desc:"前法租界长青的美式餐酒吧，最出名的是大露台和轻松热闹的社交氛围，周末早午餐配酒很受欢迎。推荐理由：比起正襟危坐喝调酒，这里更适合一群朋友晒着太阳、慢慢喝、从下午聊到天黑。",sig:["露台社交氛围","周末 brunch 配酒"],map:"Tribeca+Bar+Shanghai"},
        {name:"ToT",tag:"精致·餐酒搭配",desc:"Lemon Twist 主理人 Joseph Guo 的进阶之作（陕西北路）。把鸡尾酒做成 fine-dining 体验——生蚝、帝王蟹挞等高级小食与酒搭配，酒单随季节更新的经典改良。推荐理由：想要'酒+食'都讲究、安静精致的一晚，这里很到位。",sig:["季节性经典改良鸡尾酒","生蚝/帝王蟹等餐酒搭配"],map:"ToT+Bar+North+Shaanxi+Road+Shanghai"},
        {name:"Bar S-Otto",tag:"地下·数字8",desc:"上海第一家地下 speakeasy，藏在富民路 Atelier No.3 的暗门楼梯之下。Filippo Sanchi 与 Daniel An 主理，全店玩'8'的梗——8 杯招牌 + 8 杯经典（¥88），连镜子和灯都是8。极简亲密的吧台，另设独立威士忌房。推荐理由：富民路喝酒新地标，藏得好、调得稳、聊得开。",sig:["8 杯招牌特调","Tiramisu 等融合创意","独立威士忌房"],map:"Bar+S-Otto+Fumin+Road+Shanghai"},
        {name:"Gallows Humor",tag:"前卫·重口味",desc:"Paal 团队（Crawford Su & Aya Guan）在陕西南路的大胆之作。全黑空间，吧台上方一道绿光像倒置的台球桌。酒单挑战味蕾——皮蛋、蓝纹奶酪、橄榄等咸鲜食材入酒。推荐理由：想喝到颠覆认知、'这也能调成酒'的实验派，这里最过瘾。",sig:["Chasing Vermeer（蓝纹奶酪+草莓）","Blanc de Noir（皮蛋）","Almost Famous（梅斯卡尔改良）"],map:"Gallows+Humor+Bar+Shaanxi+South+Road+Shanghai"},
        {name:"Triple Neck",tag:"三层·沙丘主题",desc:"新闸路上，伦敦受训的上海人 Henry Wang 开的三层主题吧，灵感来自《沙丘》——每层对应一颗星球、各有酒单，越往上酒越烈、气氛越夜。酒单与伦敦 Amaro Bar 的 Elon Soddu 合作，主打中国茶与本地食材。推荐理由：主题感强、可以'一路喝上楼'，适合有探索欲的夜晚。",sig:["中国茶系列特调","逐层升级的烈度酒单"],map:"Triple+Neck+Bar+Xinzha+Road+Shanghai"},
        {name:"Bar Rock",tag:"藏地主题",desc:"OHA Group 在复兴中路的藏地主题酒吧，用牦牛黄油、沙棘等高原食材入酒，酒单按藏传佛教的三重境界分类。推荐理由：把雪域风味和叙事感做进杯子里，概念独特、风味少见。",sig:["牦牛黄油 / 沙棘等高原食材特调","按'三重境界'编排的酒单"],map:"Bar+Rock+Fuxing+Middle+Road+Shanghai"},
      ],
      beijing: [
        {name:"TIAO",tag:"胡同故事",desc:"北京文华东方前门酒店内，草厂胡同深处。每杯酒都在讲一个胡同的故事——用白酒、花椒、酸汤等在地食材，把北京的历史和记忆装进杯子里。2026年推出第三季酒单'Worlds Apart'。Trip.com 评分5.0。",sig:["Caochang Hutong（花椒+五粮液+酸汤）","Water Sleeves（番石榴+香槟，灵感来自京剧水袖）","Beijing Iced（威士忌+白酒+冰酒）"],map:"TIAO+Bar+Mandarin+Oriental+Qianmen+Beijing"},
        {name:"MO Bar",tag:"故宫景观",desc:"王府井文华东方酒店，露台直面故宫。日落时分坐在户外露台，一边看紫禁城的轮廓一边喝酒，是北京最特别的体验之一。Trip.com 评分5.0。",sig:["融入中国文化元素的特调","故宫日落景观鸡尾酒"],map:"MO+Bar+Mandarin+Oriental+Beijing+Wangfujing"},
        {name:"Janes & Hooch",tag:"先驱",desc:"北京鸡尾酒文化的先驱之一，三里屯老牌。美式 speakeasy 风格，经典鸡尾酒功底扎实，氛围轻松热闹。",sig:["Penicillin","经典老派鸡尾酒"],map:"Janes+and+Hooch+Bar+Beijing"},
        {name:"Hide & Seek",tag:"城市绿洲",desc:"朝阳区的创意鸡尾酒吧，以'城市绿洲'为概念。调酒富有想象力，空间设计独特。Trip.com 评分5.0。",sig:["季节性创意特调","视觉系鸡尾酒"],map:"Hide+and+Seek+Bar+Beijing+Chaoyang"},
        {name:"The Bvlgari Bar",tag:"奢华",desc:"北京宝格丽酒店一层，标志性椭圆形吧台。面朝私属河畔花园，意式优雅氛围。适合安静地喝一杯好酒。Condé Nast Traveler 2025金榜。",sig:["宝格丽 Aperitivo 系列","意式经典 Negroni"],map:"Bvlgari+Bar+Beijing+Hotel"},
        {name:"Revolution",tag:"创意",desc:"革命主题内饰装潢，视觉冲击力强。创意调酒水平高，适合打卡和认真喝酒兼得。",sig:["主题创意特调","革命风视觉系鸡尾酒"],map:"Revolution+Bar+Beijing"},
      ],
      singapore: [
        {name:"Jigger & Pony",tag:"亚洲第三",desc:"2025亚洲50佳 #3，新加坡最佳酒吧。Indra Kantono 和 Gan Guoyi 夫妇创立，在安详山做了十年，已经是亚洲鸡尾酒的标杆。经典鸡尾酒做到教科书级别，服务温暖专业。",sig:["Naked & Famous","Jungle Bird","经典鸡尾酒的完美版本"],map:"Jigger+and+Pony+Bar+Singapore"},
        {name:"Native",tag:"本土原料",desc:"Vijay Mudaliar 主理，2025亚洲50佳 #45。坚持只用东南亚本土原料调酒——从蚂蚁到椰花糖，从参巴辣椒到斑兰叶。每一杯都是一堂东南亚风土课。",sig:["Antz（蚂蚁+龙舌兰）","Peranakan 系列本土风味鸡尾酒"],map:"Native+Bar+Singapore"},
        {name:"Atlas",tag:"金酒殿堂",desc:"Parkview Square 大厅内的 Art Deco 宫殿，拥有全球最大的金酒收藏（1300+瓶）。15米高的金酒塔是打卡必拍。空间恢弘如同走进了《了不起的盖茨比》。",sig:["金酒 Martini（从1300瓶中选你的金酒）","Atlas Collins"],map:"Atlas+Bar+Singapore+Parkview+Square"},
        {name:"Offtrack",tag:"先锋",desc:"2025亚洲50佳 #23。在安详山的创新酒吧，酒单大胆前卫，经常跨界使用料理技法。适合想尝鲜的老饕。",sig:["实验性季节酒单","料理手法创意鸡尾酒"],map:"Offtrack+Bar+Singapore"},
        {name:"Nutmeg & Clove",tag:"南洋风情",desc:"2025亚洲50佳 #24。以新加坡香料贸易历史为灵感，在殖民时期老建筑里喝融合了肉豆蔻、丁香、班兰叶的鸡尾酒。空间美，故事好。",sig:["Nutmeg Sour","香料主题特调"],map:"Nutmeg+and+Clove+Bar+Singapore"},
        {name:"Cat Bite Club",tag:"邻里酒吧",desc:"2025亚洲50佳 #44。轻松的邻里风格酒吧，调酒好喝不装腔，价格亲民，氛围像去朋友家喝酒。",sig:["平价创意特调","轻松无压力氛围"],map:"Cat+Bite+Club+Bar+Singapore"},
        {name:"BOP (Bartenders of Pony)",tag:"2026新店",desc:"Jigger & Pony 创意总监 Uno Jang（2025世界最佳调酒师）的首个独立项目。2026年1月在 Tras Street 开业。韩国饮酒文化+K-pop 氛围，边喝 Somaek 边听80/90年代黑胶唱片。",sig:["Iced Somaek（生啤+烧酒冰沙）","Bokbunja Pop（覆盆子酒+烧酒+龙舌兰）","Perilla Smash（紫苏+金酒）"],map:"BOP+Bartenders+of+Pony+Singapore+Tras+Street"},
      ],
      tokyo: [
        {name:"Bar High Five",tag:"大师级",desc:"上野秀嗣主理，亚洲50佳传奇酒吧。银座地下，没有酒单——和 Ueno-san 聊你喜欢什么，他会为你量身定做。日式待客之道的极致体现。",sig:["完全 omakase，按你的口味定制","每杯酒都是独一无二的"],map:"Bar+High+Five+Tokyo+Ginza"},
        {name:"Bar Benfiddich",tag:"药草炼金",desc:"2025亚洲50佳 #9。�的场祐一在吧台后面用研钵现磨香料、草药，像个调酒炼金术士。自己种的草药、自制苦艾酒，每一杯都是活的。",sig:["现磨草药鸡尾酒","自制苦艾酒 Absinthe"],map:"Bar+Benfiddich+Tokyo"},
        {name:"SG Club",tag:"世界50佳",desc:"后藤健太郎在涩谷的主场。楼上 Guzzle 走轻松 highball 路线，地下 Sip 是正经的 speakeasy。世界50佳常客。",sig:["Guzzle 楼层的日式 Highball","Sip 楼层的经典 speakeasy 鸡尾酒"],map:"SG+Club+Tokyo+Shibuya"},
        {name:"Star Bar Ginza",tag:"经典",desc:"银座经典日式酒吧，岸久主理。冰球手工雕刻，每一杯都是完美主义的产物。安静、优雅、严肃对待每一杯酒。",sig:["手工冰球 Whisky","完美 Martini"],map:"Star+Bar+Ginza+Tokyo"},
        {name:"Gen Yamamoto",tag:"Omakase",desc:"麻布十番的 omakase 鸡尾酒吧，只有8个座位。用当季日本水果和食材做6-8杯 tasting course。像吃怀石料理一样喝鸡尾酒。",sig:["6-8杯季节 omakase course","当季水果限定"],map:"Gen+Yamamoto+Bar+Tokyo+Azabu"},
      ],
      london: [
        {name:"Connaught Bar",tag:"世界之巅",desc:"多次获评世界最佳酒吧。Mayfair 的 Connaught 酒店内，Art Deco 空间华丽优雅。招牌是推着银色手推车到你桌边，现场为你调制 Martini。",sig:["Tableside Martini（桌边定制马天尼）","季节特调"],map:"Connaught+Bar+London+Mayfair"},
        {name:"Tayēr + Elementary",tag:"双概念先锋",desc:"Monica Berg 和 Alex Kratena 主理。楼下 Elementary 极简——预制鸡尾酒即点即出；楼上 Tayēr 是完整的创作酒吧。两种风格，一个屋檐下。",sig:["Elementary 速饮系列","Tayēr 实验性创作"],map:"Tayer+Elementary+London"},
        {name:"Satan's Whiskers",tag:"东伦敦宝藏",desc:"Bethnal Green 的邻里酒吧，没有酒单。告诉酒保你想要什么感觉，他们会为你调。轻松、不装腔、便宜、好喝。伦敦酒保们下班后去的地方。",sig:["无酒单，按口味推荐","平价高质量"],map:"Satans+Whiskers+Bar+London+Bethnal+Green"},
        {name:"Swift",tag:"Soho 地标",desc:"Soho 中心，两层风格。楼上明亮轻松，适合下班后快速来一杯经典；楼下暗沉温暖，是慢品威士忌和深夜鸡尾酒的好地方。",sig:["楼上：经典 Daiquiri/Gimlet","楼下：稀有威士忌"],map:"Swift+Bar+London+Soho"},
      ],
      newyork: [
        {name:"Attaboy",tag:"无酒单",desc:"传奇酒吧 Milk & Honey 的继承者，下东城。没有菜单，和酒保描述你喜欢的口味，他们会为你创作。纽约 speakeasy 文化的活化石。",sig:["完全按口味定制","经典 speakeasy 体验"],map:"Attaboy+Bar+New+York+Lower+East+Side"},
        {name:"Double Chicken Please",tag:"食物灵感",desc:"2025世界50佳前列。GN Chan 和 Faye Chen 主理，每款鸡尾酒都从一道食物出发——鸡蛋三明治、意面、蛋炒饭。前厅是三明治快餐店，后面才是酒吧。",sig:["Egg Sandwich Cocktail","Fried Rice Old Fashioned"],map:"Double+Chicken+Please+New+York"},
        {name:"Katana Kitten",tag:"日式居酒屋",desc:"后藤健太郎在纽约的日式居酒屋风鸡尾酒吧。West Village 的轻松氛围，日式 Highball 做到极致，居酒屋小食搭配完美。",sig:["日式 Highball","Yuzu Gimlet"],map:"Katana+Kitten+Bar+New+York+West+Village"},
        {name:"Dead Rabbit",tag:"爱尔兰传奇",desc:"世界50佳常客。三层楼：一楼爱尔兰酒馆喝啤酒和威士忌，二楼是鸡尾酒主战场（酒单像一本小说），三楼是私密品鉴室。",sig:["Irish Coffee","Dead Rabbit Punch","故事化酒单"],map:"Dead+Rabbit+Bar+New+York"},
      ],
      mexico: [
        {name:"Handshake Speakeasy",tag:"世界冠军",desc:"2024世界最佳酒吧。藏在 Colonia Juárez 一家理发店后面，推开假墙才能进入。Eric van Beek 主理，鸡尾酒技术和创意都是顶级。",sig:["分子料理技法鸡尾酒","每季完全更新的创作酒单"],map:"Handshake+Speakeasy+Mexico+City"},
        {name:"Licorería Limantour",tag:"龙舌兰文化",desc:"墨西哥鸡尾酒文化的旗帜。以龙舌兰和梅斯卡尔为核心，把墨西哥风土和调酒结合到极致。世界50佳常客，多次入选前20。",sig:["龙舌兰/梅斯卡尔为核心的特调","墨西哥本土风味鸡尾酒"],map:"Licoreria+Limantour+Mexico+City"},
      ],
    };

    // Vibe filters: scenario / style tags mapped by bar name
    const VIBES = { classic:'经典技法', creative:'创意实验', date:'约会格调', lively:'热闹', pairing:'餐酒搭配', view:'景观', hidden:'隐藏/无菜单', local:'在地·东方', award:'获奖名店' };
    const VIBE_MAP = {
      // Shanghai
      'Speak Low':['hidden','classic','award'], 'Sober Company':['pairing','creative','award'], 'Epic':['view','date','award'], 'Bar No.3':['classic','date'], 'COA Shanghai':['creative','award','local'], 'Penicillin Shanghai':['creative','local','award'], 'Bar Leone Shanghai':['classic','award','lively'], 'Pony Up':['lively','award'], 'El Coctel':['classic','creative'], 'The Union Trading Company':['classic','award'], 'Senator Saloon':['classic','date'], 'The Nest':['view','date','pairing'], 'Constellation（酒池星座）':['classic','hidden'], 'Bar Bud':['creative','pairing','award'], 'Mi Shang · Prada 荣宅':['date','creative','view'], '酿青 Niang Qing':['local','creative'], 'Botanik':['creative','local'], "Logan's Punch":['lively'], 'The Tuxedo':['classic','date','award'], 'Asian Flush':['creative','local'], 'Tribeca':['lively','date'], 'ToT':['pairing','date','classic'], 'Bar S-Otto':['hidden','classic'], 'Gallows Humor':['creative','lively'], 'Triple Neck':['creative','local','lively'], 'Bar Rock':['creative','local'],
      // Beijing
      'TIAO':['local','creative','award'], 'MO Bar':['view','date'], 'Janes & Hooch':['classic','lively'], 'Hide & Seek':['creative','date'], 'The Bvlgari Bar':['date','view'], 'Revolution':['creative','lively'],
      // Singapore
      'Jigger & Pony':['classic','award'], 'Native':['local','creative','award'], 'Atlas':['view','date','classic'], 'Offtrack':['creative','award'], 'Nutmeg & Clove':['local','creative','award'], 'Cat Bite Club':['lively','award'], 'BOP (Bartenders of Pony)':['lively','creative'],
      // Tokyo
      'Bar High Five':['classic','hidden','award'], 'Bar Benfiddich':['creative','award'], 'SG Club':['lively','classic','award'], 'Star Bar Ginza':['classic'], 'Gen Yamamoto':['pairing','hidden','date'],
      // London
      'Connaught Bar':['classic','date','award'], 'Tayēr + Elementary':['creative','award'], "Satan's Whiskers":['classic','hidden','lively'], 'Swift':['classic','date'],
      // New York
      'Attaboy':['hidden','classic','award'], 'Double Chicken Please':['creative','pairing','award'], 'Katana Kitten':['lively','pairing','award'], 'Dead Rabbit':['classic','lively','award'],
      // Mexico City
      'Handshake Speakeasy':['hidden','creative','award'], 'Licorería Limantour':['local','classic','award'],
    };
    const vibesOf = b => VIBE_MAP[b.name] || [];

    let activeCity = 'shanghai';
    let activeVibe = 'all';
    const tabs = document.getElementById('barCityTabs');
    const cardsEl = document.getElementById('barCards');
    const filtersEl = document.getElementById('barVibeFilters');

    function renderFilters() {
      const present = [];
      (BARS[activeCity] || []).forEach(b => vibesOf(b).forEach(v => { if (!present.includes(v)) present.push(v); }));
      const order = Object.keys(VIBES).filter(k => present.includes(k));
      const chips = ['<span class="bar-vibe-label">筛选</span>', '<button class="bar-vibe-chip'+(activeVibe==='all'?' active':'')+'" data-vibe="all">全部</button>']
        .concat(order.map(k => '<button class="bar-vibe-chip'+(activeVibe===k?' active':'')+'" data-vibe="'+k+'">'+VIBES[k]+'</button>'));
      filtersEl.innerHTML = chips.join('');
      filtersEl.querySelectorAll('.bar-vibe-chip').forEach(c => c.addEventListener('click', () => {
        activeVibe = c.dataset.vibe;
        renderFilters();
        renderBars();
      }));
    }

    function renderBars() {
      const bars = BARS[activeCity] || [];
      const rows = bars.map((b, i) => ({ b, i }))
        .filter(({ b }) => activeVibe === 'all' || vibesOf(b).includes(activeVibe));
      if (!rows.length) { cardsEl.innerHTML = '<p class="bar-empty">这个筛选下还没有店，换一个标签试试 🍸</p>'; return; }
      cardsEl.innerHTML = rows.map(({ b, i }) =>
        '<div class="bar-card" data-idx="'+i+'">' +
          '<div class="bar-card-top"><span class="bar-card-name">'+b.name+'</span><span class="bar-tag">'+b.tag+'</span></div>' +
          '<p class="bar-card-desc">'+b.desc.substring(0, 60)+'…</p>' +
        '</div>'
      ).join('');
      cardsEl.querySelectorAll('.bar-card').forEach(c => {
        c.addEventListener('click', () => openBarModal(parseInt(c.dataset.idx)));
      });
    }

    tabs.addEventListener('click', e => {
      const t = e.target.closest('.bar-city-tab');
      if (!t) return;
      activeCity = t.dataset.city;
      activeVibe = 'all';
      tabs.querySelectorAll('.bar-city-tab').forEach(x => x.classList.toggle('active', x.dataset.city === activeCity));
      renderFilters();
      renderBars();
    });

    const DOMESTIC_CITY = { shanghai: '上海', beijing: '北京' };
    const barModal = document.getElementById('barModal');
    function openBarModal(idx) {
      const b = BARS[activeCity][idx];
      if (!b) return;
      const cityZh = DOMESTIC_CITY[activeCity];
      let mapHref, mapLabel;
      if (cityZh) {
        mapHref = 'https://uri.amap.com/search?keyword=' + encodeURIComponent(b.name + ' ' + cityZh) + '&callnative=1';
        mapLabel = '📍 高德地图导航';
      } else {
        mapHref = 'https://www.google.com/maps/search/?api=1&query=' + b.map;
        mapLabel = '📍 Google Maps 导航';
      }
      document.getElementById('barModalBody').innerHTML = 
        '<h2 class="bar-modal-name">'+b.name+'</h2>' +
        '<span class="bar-tag" style="margin-bottom:12px;display:inline-block">'+b.tag+'</span>' +
        '<p class="bar-modal-desc">'+b.desc+'</p>' +
        '<div class="bar-modal-section"><h3>🍸 必点</h3><ul>'+b.sig.map(s => '<li>'+s+'</li>').join('')+'</ul></div>' +
        '<a class="bar-map-btn" href="'+mapHref+'" target="_blank" rel="noopener">'+mapLabel+'</a>';
      barModal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('barModalClose').addEventListener('click', () => { barModal.classList.add('hidden'); document.body.style.overflow = ''; });
    barModal.addEventListener('click', e => { if (e.target === barModal) { barModal.classList.add('hidden'); document.body.style.overflow = ''; }});

    renderFilters();
    renderBars();
  })();
  </script>

  <main class="grid" id="grid"></main>

  <!-- Detail Modal -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-color" id="modalColor"></div>
      <div class="modal-body">
        <h2 class="modal-name" id="modalName"></h2>
        <p class="modal-zh" id="modalZh"></p>
        <div class="modal-meta" id="modalMeta"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <h3>配方</h3>
        <ul class="modal-ingredients" id="modalIngredients"></ul>
        <div class="modal-tags" id="modalTags"></div>
      </div>
    </div>
  </div>

  <footer class="footer">适度饮酒 · 数据仅供参考</footer>

  <script src="/js/cocktails-data.js"></script>
  <script src="/js/cocktails-page.js"></script>
</body>
