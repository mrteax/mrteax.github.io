<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tea X">
  <title>Tea X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
  <main class="landing">
    <div class="pack-shadow" aria-hidden="true"></div>

    <a href="/portal.html" class="pack-link" aria-label="进入 Tea X 主页">
      <span class="sr-only">Beside Me — 点击进入</span>
      <svg class="pack-svg" viewBox="0 0 160 236" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <defs>
          <pattern id="dots" width="3.2" height="3.2" patternUnits="userSpaceOnUse">
            <circle cx="1.6" cy="1.6" r="0.55" fill="#1a1a1a" opacity="0.22"/>
          </pattern>
          <clipPath id="clip">
            <rect x="8" y="18" width="144" height="206" rx="1"/>
          </clipPath>
        </defs>

        <!-- 盒身描线 -->
        <rect x="8" y="18" width="144" height="206" fill="#fff" stroke="#111" stroke-width="2.2" rx="1"/>

        <!-- 顶部封口竖条 -->
        <rect x="74" y="20" width="12" height="16" fill="#111" rx="0.5"/>

        <g clip-path="url(#clip)">
          <!-- 顶部深色：心形上沿 — 中间凹入，向左右两侧弧出 -->
          <path id="topShade"
                d="M8 36
                   H152
                   V78
                   C132 78 122 66 104 74
                   C92 86 80 86 68 74
                   C50 66 40 78 20 78
                   L8 78
                   Z"
                fill="#1f1f1f"/>
          <use href="#topShade" fill="url(#dots)"/>
        </g>

        <!-- Beside Me：漫画手写，左低右高 -->
        <text x="80" y="138"
              transform="rotate(11 80 138)"
              text-anchor="middle"
              font-family="'Reenie Beanie', 'Segoe Print', cursive"
              font-size="42"
              fill="#111"
              letter-spacing="1">Beside Me</text>
      </svg>
    </a>
  </main>
</body>
</html>
