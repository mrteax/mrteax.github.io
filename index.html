<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tea X">
  <title>Tea X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
  <main class="landing">
    <div class="pack-shadow" aria-hidden="true"></div>

    <a href="/portal.html" class="pack-link" aria-label="进入 Tea X 主页">
      <span class="sr-only">Beside Me — 点击进入</span>
      <svg class="pack-svg" viewBox="0 0 168 252" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <defs>
          <pattern id="halftone" width="4" height="4" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="0.65" fill="#1a1a1a" opacity="0.18"/>
          </pattern>
          <clipPath id="boxClip">
            <rect x="10" y="20" width="148" height="218" rx="1.5"/>
          </clipPath>
        </defs>

        <!-- 塑封顶部拉条 -->
        <rect x="72" y="13" width="24" height="9" rx="1" fill="#e8e6e3" stroke="#1a1a1a" stroke-width="1.2"/>
        <rect x="78" y="15" width="12" height="5" rx="0.5" fill="#1a1a1a"/>

        <!-- 盒身 -->
        <rect x="10" y="20" width="148" height="218" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.8" rx="1.5"/>

        <g clip-path="url(#boxClip)">
          <!-- 顶部深色区：中心尖角向左右两侧分开下弯 -->
          <path d="M10 20 H158 V88
                   C138 88 108 100 84 74
                   C60 100 30 88 10 88 Z"
                fill="#242424"/>
          <path d="M10 20 H158 V88
                   C138 88 108 100 84 74
                   C60 100 30 88 10 88 Z"
                fill="url(#halftone)"/>
        </g>

        <!-- Beside Me 手写体，左低右高 -->
        <text x="84" y="148"
              transform="rotate(9 84 148)"
              text-anchor="middle"
              font-family="'Caveat', 'Segoe Print', 'Bradley Hand', cursive"
              font-size="36"
              font-weight="600"
              fill="#1a1a1a"
              letter-spacing="0.5">Beside Me</text>
      </svg>
    </a>
  </main>
</body>
</html>
