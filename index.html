<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tea X">
  <title>Tea X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
  <main class="landing">
    <div class="pack-shadow" aria-hidden="true"></div>

    <a href="/portal.html" class="pack-link" aria-label="进入 Tea X 主页">
      <span class="sr-only">Beside Me — 点击进入</span>
      <!-- 透视立体烟盒：正面 + 顶面 + 右侧面（参照漫画手持角度） -->
      <svg class="pack-svg" viewBox="0 0 188 248" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <defs>
          <pattern id="dots" width="3" height="3" patternUnits="userSpaceOnUse">
            <circle cx="1.5" cy="1.5" r="0.5" fill="#111" opacity="0.2"/>
          </pattern>
          <clipPath id="frontClip">
            <polygon points="18,50 134,50 134,214 18,214"/>
          </clipPath>
          <clipPath id="topClip">
            <polygon points="18,50 134,50 158,38 42,38"/>
          </clipPath>
          <clipPath id="sideClip">
            <polygon points="134,50 158,38 158,202 134,214"/>
          </clipPath>
        </defs>

        <!-- 右侧面 -->
        <polygon points="134,50 158,38 158,202 134,214" fill="#ebe9e6" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
        <line x1="146" y1="56" x2="146" y2="206" stroke="#111" stroke-width="0.8" opacity="0.25"/>

        <!-- 顶面 -->
        <polygon points="18,50 134,50 158,38 42,38" fill="#fff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
        <g clip-path="url(#topClip)">
          <polygon points="18,50 134,50 158,38 42,38" fill="#1f1f1f" transform="scale(1,0.42) translate(0,68)"/>
          <polygon points="18,50 134,50 158,38 42,38" fill="url(#dots)" transform="scale(1,0.42) translate(0,68)"/>
        </g>
        <!-- 顶面封口竖条 -->
        <polygon points="72,48 86,48 88,40 74,40" fill="#111"/>

        <!-- 正面 -->
        <polygon points="18,50 134,50 134,214 18,214" fill="#fff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>

        <g clip-path="url(#frontClip)">
          <!-- 顶部深色区：心形上沿，中间凹、两侧弧出 -->
          <path id="shade"
                d="M18 64
                   H134
                   V102
                   C118 102 108 90 92 98
                   C82 110 70 110 60 98
                   C44 90 34 102 18 102
                   Z"
                fill="#1f1f1f"/>
          <use href="#shade" fill="url(#dots)"/>
        </g>

        <!-- 正面封口竖条 -->
        <rect x="70" y="52" width="14" height="18" fill="#111" rx="0.5"/>

        <!-- Beside Me 手写体 -->
        <text x="76" y="148"
              transform="rotate(11 76 148)"
              text-anchor="middle"
              font-family="'Reenie Beanie', 'Segoe Print', cursive"
              font-size="40"
              fill="#111"
              letter-spacing="0.5">Beside Me</text>

        <!-- 棱线强调立体 -->
        <line x1="134" y1="50" x2="134" y2="214" stroke="#111" stroke-width="2"/>
        <line x1="18" y1="50" x2="134" y2="50" stroke="#111" stroke-width="2"/>
        <line x1="134" y1="50" x2="158" y2="38" stroke="#111" stroke-width="2"/>
        <line x1="18" y1="50" x2="42" y2="38" stroke="#111" stroke-width="2"/>
      </svg>
    </a>
  </main>
</body>
</html>
