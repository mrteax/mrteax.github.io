<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tea X">
  <title>Tea X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
  <main class="landing">
    <div class="pack-shadow" aria-hidden="true"></div>

    <a href="/portal.html" class="pack-link" aria-label="进入 Tea X 主页">
      <span class="sr-only">Beside Me — 点击进入</span>
      <svg class="pack-svg" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <defs>
          <linearGradient id="packBody" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f0eeec"/>
          </linearGradient>
          <linearGradient id="packRed" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#d4282e"/>
            <stop offset="100%" stop-color="#a8181e"/>
          </linearGradient>
          <linearGradient id="packGold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e8c84a"/>
            <stop offset="50%" stop-color="#c9a227"/>
            <stop offset="100%" stop-color="#a07d18"/>
          </linearGradient>
          <linearGradient id="foil" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="45%" stop-color="rgba(255,255,255,0.35)"/>
            <stop offset="55%" stop-color="rgba(255,255,255,0.15)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.12)"/>
          </filter>
        </defs>

        <!-- Pack body -->
        <rect x="20" y="52" width="160" height="210" rx="4" fill="url(#packBody)" stroke="#d8d4d0" stroke-width="0.8"/>

        <!-- Red top flap (Marlboro-style chevron) -->
        <path d="M20 52 L100 18 L180 52 Z" fill="url(#packRed)"/>
        <path d="M20 52 L100 18 L180 52 L180 68 L20 68 Z" fill="url(#packRed)" opacity="0.15"/>

        <!-- Lid seam -->
        <line x1="20" y1="68" x2="180" y2="68" stroke="#8a1014" stroke-width="0.6" opacity="0.5"/>

        <!-- Side depth -->
        <path d="M180 52 L188 56 L188 262 L180 262 Z" fill="#e8e4e0"/>
        <path d="M20 262 L180 262 L188 262 L188 256 L20 256 Z" fill="#ddd8d4"/>

        <!-- Gold crest -->
        <circle cx="100" cy="118" r="22" fill="url(#packGold)" filter="url(#innerShadow)"/>
        <circle cx="100" cy="118" r="18" fill="none" stroke="#a07d18" stroke-width="0.8" opacity="0.6"/>
        <path d="M100 104 L106 116 L100 128 L94 116 Z" fill="#8a6510" opacity="0.5"/>
        <text x="100" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#6b5010" letter-spacing="1">BM</text>

        <!-- Beside Me script logo -->
        <text x="100" y="168" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" font-weight="700" fill="#c41e24" letter-spacing="-0.5">Beside</text>
        <text x="100" y="192" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" font-weight="700" fill="#c41e24" letter-spacing="-0.5">Me</text>

        <!-- Filter line -->
        <rect x="44" y="206" width="112" height="1" fill="#ccc8c4"/>
        <text x="100" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#999" letter-spacing="2.5">FILTER CIGARETTES</text>

        <!-- Health warning strip -->
        <rect x="24" y="232" width="152" height="24" rx="1" fill="#f5f3f0" stroke="#e0dcd8" stroke-width="0.5"/>
        <text x="100" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#888" letter-spacing="0.3">喫煙は健康に有害です</text>
        <text x="100" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#aaa">SMOKING MAY BE HAZARDOUS</text>

        <!-- Cellophane shine -->
        <rect x="20" y="52" width="160" height="210" rx="4" fill="url(#foil)" pointer-events="none"/>

        <!-- Subtle edge highlight -->
        <rect x="20" y="52" width="160" height="210" rx="4" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
      </svg>
    </a>
  </main>
</body>
</html>
