<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tea X">
  <title>Tea X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
  <main class="landing">
    <div class="pack-shadow" aria-hidden="true"></div>

    <a href="/portal.html" class="pack-link" aria-label="进入 Tea X 主页">
      <span class="sr-only">Beside Me — 点击进入</span>
      <!-- 日本版マールボロ（赤マル）レイアウト — 《ヤニ吸うふたり》Beside Me -->
      <svg class="pack-svg" viewBox="0 0 176 268" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <defs>
          <linearGradient id="redBand" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d42026"/>
            <stop offset="100%" stop-color="#b01018"/>
          </linearGradient>
          <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#e8cc55"/>
            <stop offset="45%" stop-color="#c9a02a"/>
            <stop offset="100%" stop-color="#9a7518"/>
          </linearGradient>
          <linearGradient id="sideFace" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ece8e4"/>
            <stop offset="100%" stop-color="#d8d4d0"/>
          </linearGradient>
          <linearGradient id="cellophane" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="42%" stop-color="rgba(255,255,255,0.28)"/>
            <stop offset="50%" stop-color="rgba(255,255,255,0.08)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <clipPath id="frontClip">
            <rect x="14" y="20" width="148" height="228" rx="2.5"/>
          </clipPath>
        </defs>

        <!-- 3D: right side -->
        <path d="M162 20 L172 26 L172 248 L162 242 Z" fill="url(#sideFace)"/>
        <!-- 3D: bottom -->
        <path d="M14 242 L162 242 L172 248 L24 248 Z" fill="#d0ccc8"/>

        <!-- Cellophane pull strip -->
        <rect x="68" y="14" width="40" height="7" rx="1" fill="#c8c4c0" opacity="0.85"/>
        <rect x="72" y="15.5" width="32" height="4" rx="0.5" fill="#e8e4e0"/>

        <!-- Front face -->
        <g clip-path="url(#frontClip)">
          <!-- White body -->
          <rect x="14" y="20" width="148" height="228" fill="#faf9f7"/>

          <!-- Red top band (日本マールボロ横分) -->
          <rect x="14" y="20" width="148" height="88" fill="url(#redBand)"/>

          <!-- Flip-top lid seam -->
          <line x1="14" y1="52" x2="162" y2="52" stroke="#8a0a10" stroke-width="0.7" opacity="0.45"/>

          <!-- Gold crest at red/white boundary -->
          <circle cx="88" cy="108" r="27" fill="url(#goldRing)" stroke="#8a7010" stroke-width="0.6"/>
          <circle cx="88" cy="108" r="23.5" fill="none" stroke="#f0d860" stroke-width="0.5" opacity="0.7"/>
          <!-- Inner red field + chevron -->
          <circle cx="88" cy="108" r="19" fill="#c41e24"/>
          <path d="M88 94 L100 118 L76 118 Z" fill="#d42026"/>
          <path d="M88 97 L96 115 L80 115 Z" fill="#f0d040" opacity="0.35"/>

          <!-- Beside Me script logo (Marlboro-style placement) -->
          <text x="88" y="152"
                text-anchor="middle"
                font-family="'Brush Script MT', 'Segoe Script', 'Snell Roundhand', cursive"
                font-size="28"
                fill="#c41e24"
                letter-spacing="-0.5">Beside Me</text>

          <!-- Subtitle -->
          <line x1="40" y1="162" x2="136" y2="162" stroke="#d0ccc8" stroke-width="0.5"/>
          <text x="88" y="174" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="6.5" fill="#888" letter-spacing="1.8">FILTER CIGARETTES</text>
          <text x="88" y="184" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#999" letter-spacing="0.5">20</text>

          <!-- Japanese health warning -->
          <rect x="20" y="200" width="136" height="40" fill="#f2f0ee" stroke="#ddd8d4" stroke-width="0.5"/>
          <text x="88" y="214" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="6.5" font-weight="700" fill="#333">喫煙は健康に有害です</text>
          <text x="88" y="224" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="5.5" fill="#555">喫煙により肺癌の危険性が高まるなどの</text>
          <text x="88" y="232" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="5.5" fill="#555">健康への影響があります</text>
        </g>

        <!-- Front border -->
        <rect x="14" y="20" width="148" height="228" rx="2.5" fill="none" stroke="#c8c4c0" stroke-width="0.8"/>

        <!-- Cellophane shine -->
        <rect x="14" y="20" width="148" height="228" rx="2.5" fill="url(#cellophane)" pointer-events="none"/>

        <!-- Side branding (vertical) -->
        <text x="167" y="140" text-anchor="middle"
              transform="rotate(90 167 140)"
              font-family="Georgia, serif" font-size="7" font-weight="700"
              fill="#b01018" letter-spacing="1.5" opacity="0.7">BESIDE ME</text>
      </svg>
    </a>
  </main>
</body>
</html>
