<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>今日状态 · Tea X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/themes.css">
  <style>
    .health-wrap{max-width:520px;margin:20px auto;padding:0 16px}
    .health-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
    .health-card h2{font-size:1.1rem;margin-bottom:14px}
    .input-group{margin-bottom:14px}
    .input-group label{display:block;font-size:.82rem;color:var(--text-2);margin-bottom:4px;font-weight:500}
    .input-group input,.input-group select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text);font-family:var(--font);font-size:.9rem;outline:none}
    .input-group input:focus,.input-group select:focus{border-color:var(--accent)}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .assess-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
    .assess-btn:hover{opacity:.9;transform:scale(1.01)}
    .result-card{display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:14px;text-align:center}
    .result-card.show{display:block;animation:fadeIn .4s ease}
    .result-emoji{font-size:3rem;margin-bottom:8px}
    .result-level{font-size:1.4rem;font-weight:900;margin-bottom:4px}
    .result-desc{font-size:.88rem;color:var(--text-2);line-height:1.7;margin-bottom:16px}
    .result-plan{text-align:left;background:var(--bg-input);border-radius:var(--radius-sm);padding:16px;margin-bottom:14px}
    .result-plan h3{font-size:.88rem;margin-bottom:8px;color:var(--accent)}
    .result-plan ul{padding-left:18px;font-size:.85rem;line-height:1.8;color:var(--text-2)}
    .result-scores{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
    .score-tag{padding:4px 12px;border-radius:100px;font-size:.75rem;font-weight:500}
    .score-green{background:rgba(39,174,96,.1);color:#27ae60}
    .score-yellow{background:rgba(243,156,18,.1);color:#f39c12}
    .score-red{background:rgba(231,76,60,.1);color:#e74c3c}
    .shortcut-section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
    .shortcut-section h2{font-size:1rem;margin-bottom:12px}
    .shortcut-steps{font-size:.82rem;color:var(--text-2);line-height:1.9}
    .shortcut-steps li{margin-bottom:6px}
    .shortcut-steps code{background:var(--bg-input);padding:1px 6px;border-radius:4px;font-size:.78rem}
    .history-section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
    .history-section h2{font-size:1rem;margin-bottom:10px}
    .history-list{font-size:.82rem;color:var(--text-2)}
    .history-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
    .history-item:last-child{border-bottom:none}
    .hi-date{color:var(--text-3);font-family:var(--mono)}
    .clear-btn{margin-top:10px;padding:6px 14px;border:1px solid var(--border);border-radius:100px;background:none;color:var(--text-3);font-size:.75rem;cursor:pointer}
    .hint{font-size:.8rem;color:var(--text-3);line-height:1.6;margin-bottom:12px}
    .dropzone{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px 16px;border:1.5px dashed var(--border);border-radius:var(--radius);background:var(--bg-input);color:var(--text-2);font-size:.88rem;cursor:pointer;transition:all .2s}
    .dropzone:hover,.dropzone.drag{border-color:var(--accent);color:var(--accent);background:rgba(176,125,79,.06)}
    .parse-msg{font-size:.8rem;margin-top:10px;line-height:1.6}
    .parse-msg.err{color:#e74c3c}
    .parse-msg.ok{color:#27ae60}
    .parsed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-top:14px}
    .parsed-grid:empty{display:none}
    .metric-cell{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
    .metric-cell .mv{font-size:1.02rem;font-weight:700;font-family:var(--mono);line-height:1.2}
    .metric-cell .mu{font-size:.6rem;color:var(--text-3);font-family:var(--mono)}
    .metric-cell .ml{font-size:.68rem;color:var(--text-3);margin-top:3px}
    .trend-insights{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
    .trend-insight{display:flex;gap:8px;align-items:flex-start;font-size:.84rem;line-height:1.6;color:var(--text-2);background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
    .trend-insight .ti-ico{flex-shrink:0}
    .trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.trend-grid{grid-template-columns:1fr}}
    .trend-item{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
    .trend-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
    .trend-label{font-size:.78rem;color:var(--text-2);font-weight:600}
    .trend-now{font-size:1.05rem;font-weight:700;font-family:var(--mono)}
    .trend-now small{font-size:.62rem;color:var(--text-3);font-weight:400}
    .trend-sub{display:flex;justify-content:space-between;align-items:center;font-size:.68rem;color:var(--text-3);margin-top:4px}
    .trend-delta.up{color:#27ae60}.trend-delta.down{color:#e74c3c}.trend-delta.flat{color:var(--text-3)}
    .spark{display:block;width:100%;height:34px;margin-top:6px}
    .spark polyline{fill:none;stroke:var(--accent);stroke-width:2;vector-effect:non-scaling-stroke;stroke-linejoin:round;stroke-linecap:round}
    .spark circle{fill:var(--accent)}
  </style>
</head>
<body>
  <nav class="nav"><a href="/portal.html" class="nav-home">✨ Tea X</a><span class="nav-title">❤️ 今日状态评估</span><button class="theme-btn" id="themeToggle">🌙</button></nav>

  <div class="health-wrap">

    <!-- Cloud auto-sync (Health Auto Export → Supabase) -->
    <div class="health-card">
      <h2>🔄 每日自动同步</h2>
      <p class="parse-msg" id="syncHint" style="margin-top:0">正在从云端读取最新数据…</p>
      <button class="assess-btn" id="syncBtn" style="margin-top:6px;font-size:.9rem;padding:11px">↻ 立即从云端同步</button>
      <button class="assess-btn" id="shareBtn" style="display:none;margin-top:8px;font-size:.9rem;padding:11px;background:var(--bg-input);color:var(--accent);border:1px solid var(--border)">📤 导出最新数据分享给 AI</button>
    </div>

    <!-- Import Health Auto Export JSON (fallback / one-off) -->
    <div class="health-card">
      <h2>📥 手动导入 <span style="font-size:.72rem;font-weight:400;color:var(--text-3)">（临时用）</span></h2>
      <p class="hint">把 Health Auto Export 导出的 <code>.json</code> 文件拖进来，或点击选择。文件只在你的浏览器本地解析，<strong>不会上传</strong>到任何服务器。</p>
      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".json,application/json" hidden>
        <span id="dzText">📄 点击选择，或把 JSON 文件拖到这里</span>
      </label>
      <p class="parse-msg" id="parseMsg"></p>
      <div class="parsed-grid" id="parsedGrid"></div>
    </div>

    <!-- Input -->
    <div class="health-card">
      <h2>📊 输入今日数据 <span style="font-size:.72rem;font-weight:400;color:var(--text-3)">（导入后会自动填好，可手动微调）</span></h2>
      <div class="input-row">
        <div class="input-group">
          <label>😴 睡眠时长（小时）</label>
          <input type="number" id="inSleep" placeholder="7.5" step="0.5" min="0" max="16">
        </div>
        <div class="input-group">
          <label>💤 睡眠质量</label>
          <select id="inSleepQ">
            <option value="">选择…</option>
            <option value="5">很好，一觉到天亮</option>
            <option value="4">不错，醒了1次</option>
            <option value="3">一般，醒了几次</option>
            <option value="2">差，翻来覆去</option>
            <option value="1">很差，几乎没睡</option>
          </select>
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>❤️ 静息心率（bpm）</label>
          <input type="number" id="inHR" placeholder="62" min="30" max="150">
        </div>
        <div class="input-group">
          <label>📈 HRV（ms）</label>
          <input type="number" id="inHRV" placeholder="45" min="5" max="200">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>⚡ 主观精力（1-10）</label>
          <input type="number" id="inEnergy" placeholder="7" min="1" max="10">
        </div>
        <div class="input-group">
          <label>🦵 肌肉酸痛</label>
          <select id="inSore">
            <option value="">选择…</option>
            <option value="0">完全不酸</option>
            <option value="1">轻微</option>
            <option value="2">中度</option>
            <option value="3">严重</option>
          </select>
        </div>
      </div>
      <button class="assess-btn" id="assessBtn">评估今日状态</button>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-emoji" id="rEmoji">🟢</div>
      <div class="result-level" id="rLevel">—</div>
      <div class="result-scores" id="rScores"></div>
      <p class="result-desc" id="rDesc"></p>
      <div class="result-plan" id="rPlan"></div>
    </div>

    <!-- Trends -->
    <div class="health-card" id="trendCard" style="display:none">
      <h2>📈 近期趋势 <span id="trendRange" style="font-size:.72rem;font-weight:400;color:var(--text-3)"></span></h2>
      <div class="trend-insights" id="trendInsights"></div>
      <div class="trend-grid" id="trendGrid"></div>
    </div>

    <!-- History -->
    <div class="history-section">
      <h2>📅 历史记录</h2>
      <div class="history-list" id="historyList"><p style="color:var(--text-3);font-size:.82rem">暂无记录</p></div>
      <button class="clear-btn" id="clearHistory">清空记录</button>
    </div>

  </div>

  <footer class="footer">数据仅存储在你的浏览器中</footer>

  <script>
  (() => {
    // Theme
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
    html.dataset.theme = saved;
    const tb = document.getElementById('themeToggle');
    tb.textContent = saved==='dark'?'☀️':'🌙';
    tb.addEventListener('click', () => { const n = html.dataset.theme==='dark'?'light':'dark'; html.dataset.theme=n; localStorage.setItem('theme',n); tb.textContent=n==='dark'?'☀️':'🌙'; });

    const $ = s => document.getElementById(s);
    let lastParsed = null, lastRaw = null;

    function assess() {
      const sleep = parseFloat($('inSleep').value) || 0;
      const sleepQ = parseInt($('inSleepQ').value) || 3;
      const hr = parseInt($('inHR').value) || 0;
      const hrv = parseInt($('inHRV').value) || 0;
      const energyRaw = $('inEnergy').value;
      const soreRaw = $('inSore').value;
      const energy = parseInt(energyRaw) || 0;
      const sore = parseInt(soreRaw) || 0;

      if (!sleep && !hr && !hrv) { alert('请至少填写一项数据，或导入 Health Auto Export 文件'); return; }

      // Score each dimension (0-100)
      let scores = {};

      // Sleep score
      if (sleep > 0) {
        let ss = 0;
        if (sleep >= 7 && sleep <= 9) ss = 90 + sleepQ * 2;
        else if (sleep >= 6) ss = 60 + sleepQ * 4;
        else if (sleep >= 5) ss = 40 + sleepQ * 3;
        else ss = 20 + sleepQ * 2;
        scores.sleep = Math.min(100, ss);
      }

      // HR score (lower resting HR = better recovery, baseline ~60)
      if (hr > 0) {
        if (hr <= 55) scores.hr = 95;
        else if (hr <= 62) scores.hr = 85;
        else if (hr <= 70) scores.hr = 70;
        else if (hr <= 80) scores.hr = 50;
        else scores.hr = 30;
      }

      // HRV score (higher = better recovery)
      if (hrv > 0) {
        if (hrv >= 60) scores.hrv = 95;
        else if (hrv >= 45) scores.hrv = 80;
        else if (hrv >= 30) scores.hrv = 60;
        else if (hrv >= 20) scores.hrv = 40;
        else scores.hrv = 20;
      }

      // Energy + soreness (only count if the user actually provided them)
      if (energyRaw !== '') scores.energy = energy * 10;
      if (soreRaw !== '') scores.soreness = (3 - sore) / 3 * 100;

      // Weighted average
      const weights = { sleep: 25, hr: 20, hrv: 25, energy: 20, soreness: 10 };
      let totalWeight = 0, totalScore = 0;
      for (const [k, v] of Object.entries(scores)) {
        if (weights[k]) { totalScore += v * weights[k]; totalWeight += weights[k]; }
      }
      const overall = totalWeight > 0 ? Math.round(totalScore / totalWeight) : 50;

      // Determine recommendation
      let level, emoji, desc, plan;

      if (overall >= 80) {
        level = '🟢 状态极佳 — 全力训练日';
        emoji = '💪';
        desc = '你的身体恢复充分，今天适合高强度训练。可以挑战力量、爆发力或长时间有氧。';
        plan = {
          title: '推荐训练方案',
          items: [
            '力量训练：大肌群复合动作（深蹲/硬拉/卧推），4-5组 × 5-8次',
            '或 高强度间歇（HIIT）：30秒全力 + 30秒休息 × 8-10轮',
            '或 长距离有氧：跑步/骑行 45-60 分钟',
            '网球：可以打高强度比赛或发球训练',
            '训练后补充蛋白质和碳水',
          ]
        };
      } else if (overall >= 60) {
        level = '🟡 状态不错 — 中等强度';
        emoji = '🏃';
        desc = '身体恢复尚可，适合中等强度训练。避免极限重量和高冲击动作。';
        plan = {
          title: '推荐训练方案',
          items: [
            '功能性训练：中等重量复合动作，3-4组 × 8-12次',
            '或 稳态有氧：慢跑/快走/骑行 30-40 分钟',
            '网球：技术练习或轻松对打',
            '加入 15 分钟灵活性/拉伸训练',
            '膝盖有问题可做康复动作（TKE、蚌式开合等）',
          ]
        };
      } else if (overall >= 40) {
        level = '🟠 需要恢复 — 轻度活动';
        emoji = '🧘';
        desc = '身体信号显示恢复不足。今天以恢复为主，避免加重疲劳。';
        plan = {
          title: '推荐恢复方案',
          items: [
            '轻度瑜伽或拉伸 20-30 分钟',
            '散步 30 分钟（不要跑）',
            '泡沫轴放松紧张肌群',
            '膝盖康复：靠墙静蹲、直腿抬高等低强度动作',
            '关注补水和营养，早睡',
          ]
        };
      } else {
        level = '🔴 身体疲劳 — 休息日';
        emoji = '😴';
        desc = '身体明确需要休息。今天不要训练，专注恢复。';
        plan = {
          title: '今日重点：恢复',
          items: [
            '完全休息，不做任何训练',
            '轻度散步（15分钟以内）可以促进血液循环',
            '充足睡眠（目标 8+ 小时）',
            '补充水分、蛋白质、蔬菜',
            '如果连续多天在红区，考虑调整训练计划或就医',
          ]
        };
      }

      // Display
      const card = $('resultCard');
      $('rEmoji').textContent = emoji;
      $('rLevel').textContent = level;
      $('rDesc').textContent = desc;

      const scoreLabels = { sleep:'睡眠', hr:'心率', hrv:'HRV', energy:'精力', soreness:'酸痛' };
      $('rScores').innerHTML = Object.entries(scores).map(([k,v]) => {
        const cls = v >= 70 ? 'score-green' : v >= 40 ? 'score-yellow' : 'score-red';
        return `<span class="score-tag ${cls}">${scoreLabels[k]||k} ${Math.round(v)}</span>`;
      }).join('') + `<span class="score-tag ${overall>=70?'score-green':overall>=40?'score-yellow':'score-red'}">综合 ${overall}</span>`;

      $('rPlan').innerHTML = `<h3>${plan.title}</h3><ul>${plan.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
      card.classList.add('show');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });

      // Save to history
      const history = JSON.parse(localStorage.getItem('teax_health_history') || '[]');
      history.unshift({
        date: new Date().toLocaleDateString('zh-CN'),
        score: overall,
        level: level.split('—')[0].trim(),
        sleep, hr, hrv, energy
      });
      if (history.length > 30) history.pop();
      localStorage.setItem('teax_health_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('teax_health_history') || '[]');
      const el = $('historyList');
      if (!history.length) { el.innerHTML = '<p style="color:var(--text-3);font-size:.82rem">暂无记录</p>'; return; }
      el.innerHTML = history.slice(0, 10).map(h =>
        `<div class="history-item"><span class="hi-date">${h.date}</span><span>${h.level}</span><span>综合 ${h.score}</span></div>`
      ).join('');
    }

    // ===== Health Auto Export JSON import =====
    const sum = a => a.reduce((x, y) => x + y, 0);
    const avg = a => a.length ? sum(a) / a.length : null;
    const num = v => { const n = Number(v); return isFinite(n) ? n : null; };
    const dayKey = d => String(d || '').slice(0, 10);

    function parseHealthExport(json) {
      const metrics = (json && json.data && json.data.metrics) || json.metrics || [];
      if (!Array.isArray(metrics) || !metrics.length) return null;
      const byName = {};
      metrics.forEach(m => { if (m && m.name) byName[m.name] = m; });

      function latestDayPoints(name) {
        const m = byName[name];
        if (!m || !Array.isArray(m.data) || !m.data.length) return [];
        let latest = '';
        m.data.forEach(p => { const k = dayKey(p.date); if (k > latest) latest = k; });
        return m.data.filter(p => dayKey(p.date) === latest);
      }

      const out = { date: null, found: 0 };

      // Sleep
      const sp = latestDayPoints('sleep_analysis');
      if (sp.length) {
        out.date = dayKey(sp[0].date);
        let asleep = 0, inBed = 0, deep = 0, rem = 0, core = 0, awake = 0;
        sp.forEach(p => {
          asleep += num(p.asleep) || num(p.totalSleep) || 0;
          inBed += num(p.inBed) || 0;
          deep += num(p.deep) || 0;
          rem += num(p.rem) || 0;
          core += num(p.core) || 0;
          awake += num(p.awake) || 0;
        });
        if (!asleep && (deep || rem || core)) asleep = deep + rem + core;
        if (asleep) { out.sleep = Math.round(asleep * 10) / 10; out.found++; }
        if (inBed) out.inBed = Math.round(inBed * 10) / 10;
        if (deep) out.deep = Math.round(deep * 10) / 10;
        if (rem) out.rem = Math.round(rem * 10) / 10;
        if (core) out.core = Math.round(core * 10) / 10;
        if (awake) out.awake = Math.round(awake * 10) / 10;
      }

      // Resting heart rate (fallback to min of heart_rate)
      const rhr = latestDayPoints('resting_heart_rate');
      const rhrVals = rhr.map(p => num(p.qty)).filter(x => x != null);
      if (rhrVals.length) { out.restingHR = Math.round(avg(rhrVals)); out.found++; }
      const hr = latestDayPoints('heart_rate');
      const mins = hr.map(p => num(p.Min != null ? p.Min : p.min)).filter(x => x != null);
      const avgs = hr.map(p => num(p.Avg != null ? p.Avg : p.avg)).filter(x => x != null);
      if (mins.length) out.minHR = Math.round(Math.min(...mins));
      if (avgs.length) out.avgHR = Math.round(avg(avgs));
      if (out.restingHR == null && out.minHR != null) { out.restingHR = out.minHR; out.found++; }
      if (!out.date && hr.length) out.date = dayKey(hr[0].date);

      // HRV
      const hrv = latestDayPoints('heart_rate_variability');
      const hrvVals = hrv.map(p => num(p.qty)).filter(x => x != null);
      if (hrvVals.length) { out.hrv = Math.round(avg(hrvVals)); out.found++; }

      // Activity
      const steps = latestDayPoints('step_count');

        const p = (hrvCur - hrvBase) / hrvBase * 100;
        if (p >= 8) ins.push(['💚', `HRV 比近期基线高 ${p.toFixed(0)}%，自主神经恢复良好，今天可以适当加量。`]);
        else if (p <= -12) ins.push(['🟠', `HRV 比基线低 ${Math.abs(p).toFixed(0)}%，可能累积疲劳/压力/睡眠不足，建议今天降低强度。`]);
        else ins.push(['🟢', `HRV 接近近期基线（${Math.round(hrvBase)}ms 上下），状态平稳。`]);
      }
      if (rhrCur != null && rhrBase) {
        const diff = rhrCur - rhrBase;
        if (diff >= 4) ins.push(['🟠', `静息心率比基线高 ${diff.toFixed(0)} bpm，常见于睡眠不足、脱水或将要生病，注意观察。`]);
        else if (diff <= -3) ins.push(['💚', `静息心率低于基线，循环系统恢复得不错。`]);
      }
      const sleep7 = meanOf(sleepCol.slice(-7));
      if (sleep7 != null) {
        if (sleep7 < 6.5) ins.push(['😴', `近一周平均睡眠仅 ${sleep7.toFixed(1)} 小时，偏少，优先补觉对恢复影响最大。`]);
        else if (sleep7 >= 7.5) ins.push(['💚', `近一周平均睡眠 ${sleep7.toFixed(1)} 小时，很充足，保持住。`]);
      }
      $('trendInsights').innerHTML = ins.map(([i, t]) => `<div class="trend-insight"><span class="ti-ico">${i}</span><span>${t}</span></div>`).join('');

      $('trendRange').textContent = `${series[0].date} ～ ${series[series.length - 1].date} · ${series.length} 天`;
      card.style.display = 'block';
    }

    async function cloudSync(auto) {
      const hint = $('syncHint');
      hint.className = 'parse-msg';
      hint.textContent = '正在从云端读取最新数据…';
      try {
        const r = await fetch(
          `${SUPA.url}/rest/v1/${SUPA.table}?select=data,created_at&order=created_at.desc&limit=60`,
          { headers: { apikey: SUPA.key, Authorization: `Bearer ${SUPA.key}` } }
        );
        if (r.status === 404) {
          hint.className = 'parse-msg';
          hint.textContent = '尚未开启云端同步。展开下方「怎么开启每日自动上传」按一次性步骤设置即可。';
          return;
        }
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const rows = await r.json();
        if (!rows.length) {
          hint.className = 'parse-msg';
          hint.textContent = auto
            ? '云端暂无数据。展开下方说明开启每日自动上传后，数据会自动出现在这里。'
            : '云端暂无数据，请先按下方说明开启自动上传。';
          return;
        }
        const norm = normalizeExport(rows[0].data);
        const p = parseHealthExport(norm);
        if (!p || !p.found) {
          hint.className = 'parse-msg err';
          hint.textContent = '读到了云端数据，但没识别到睡眠/心率/HRV 指标。';
          return;
        }
        lastRaw = norm;
        const when = rows[0].created_at ? new Date(rows[0].created_at).toLocaleString('zh-CN') : '';
        hint.className = 'parse-msg ok';
        hint.textContent = `✅ 已从云端同步${p.date ? '（数据日期 ' + p.date + '）' : ''}${when ? '，上传于 ' + when : ''}`;
        renderTrends(buildSeries(rows));
        applyParsed(p);
      } catch (e) {
        hint.className = 'parse-msg err';
        hint.textContent = '❌ 同步失败：' + (e.message || e) + '（先确认已建表并开启读写权限）';
      }
    }
    $('syncBtn').addEventListener('click', () => cloudSync(false));
    cloudSync(true);

    // ===== Export the full raw latest record to share with an AI app =====
    const SHARE_LABEL = '📤 导出最新数据分享给 AI';
    async function shareToAI() {
      const sb = $('shareBtn');
      if (!lastRaw) { return; }
      const json = JSON.stringify(lastRaw, null, 2);
      const date = (lastParsed && lastParsed.date) || 'latest';
      const text = '这是我最新的健康数据（完整原始 JSON），请帮我分析今天的恢复状态并给出训练建议：\n' + json;
      const fname = `health-${date}.json`;
      try {
        if (navigator.canShare) {
          const file = new File([json], fname, { type: 'application/json' });
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: '健康数据', text: '我最新的健康数据' });
            return;
          }
        }
        if (navigator.share) { await navigator.share({ title: '健康数据', text }); return; }
      } catch (e) { if (e && e.name === 'AbortError') return; }
      try {
        await navigator.clipboard.writeText(text);
        sb.textContent = '✅ 已复制，去 AI 里粘贴吧';
        setTimeout(() => { sb.textContent = SHARE_LABEL; }, 2200);
        return;
      } catch (e) {}
      const url = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
      const a = document.createElement('a');
      a.href = url; a.download = fname; a.click();
      URL.revokeObjectURL(url);
    }
    $('shareBtn').addEventListener('click', shareToAI);

    $('assessBtn').addEventListener('click', assess);
    $('clearHistory').addEventListener('click', () => {
      if (confirm('确定清空所有历史记录？')) {
        localStorage.removeItem('teax_health_history');
        renderHistory();
      }
    });
    renderHistory();
  })();
  </script>
</body>
