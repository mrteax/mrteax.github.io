name: HealthAutoUploader
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.xiongjiannan.healthautouploader
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: HealthAutoUploader/Resources/Info.plist
    ENABLE_PREVIEWS: YES
targets:
  HealthAutoUploader:
    type: application
    platform: iOS
    sources:
      - path: HealthAutoUploader
    entitlements:
      path: HealthAutoUploader/Resources/HealthAutoUploader.entitlements
    settings:
      base:
        PRODUCT_NAME: HealthAutoUploader
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
schemes:
  HealthAutoUploader:
    build:
      targets:
        HealthAutoUploader: all
    run:
      config: Debug
    archive:
      config: Release
