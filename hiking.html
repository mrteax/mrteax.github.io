<body>
  <nav class="nav"><a href="/" class="nav-home">🍵 Tea X</a><span class="nav-title">🥾 徒步路线百科</span><button class="theme-btn" id="themeToggle">🌙</button></nav>
  <div class="filter-bar">
    <input class="search-input" id="searchInput" placeholder="🔍 搜索路线名称、地区…" spellcheck="false">
    <div class="cat-filters" id="catFilters"><button class="cat-tag active" data-cat="all">全部地区</button></div>
    <div class="cat-filters" id="diffFilters">
      <button class="cat-tag active" data-diff="all">全部难度</button>
      <button class="cat-tag" data-diff="easy">🟢 轻松</button>
      <button class="cat-tag" data-diff="moderate">🟡 中等</button>
      <button class="cat-tag" data-diff="hard">🟠 困难</button>
      <button class="cat-tag" data-diff="expert">🔴 专家</button>
    </div>
    <div class="cat-filters" id="durFilters">
      <button class="cat-tag active" data-dur="all">全部天数</button>
      <button class="cat-tag" data-dur="day">当天往返</button>
      <button class="cat-tag" data-dur="short">2-4天</button>
      <button class="cat-tag" data-dur="long">5天以上</button>
    </div>
  </div>
  <div class="count-bar"><span id="resultCount">0</span> 条路线</div>
    <div class="map-section open" id="mapSection">

          <!-- Central America -->
          <path d="M150,195 L160,200 168,208 172,218 178,225 185,230 182,235 175,232 168,228 160,225 155,215 148,205 150,195Z"/>

        <!-- Grid lines -->
        <g stroke="var(--map-grid,rgba(150,150,150,0.08))" stroke-width=".5" fill="none">
          <line x1="0" y1="200" x2="800" y2="200"/>
          <line x1="400" y1="0" x2="400" y2="400"/>

          <path d="M0,300 Q400,320 800,300" stroke-dasharray="4,4"/>

        <text x="400" y="392" text-anchor="middle" fill="var(--t3,#999)" font-size="9" font-family="var(--font)">点击圆点查看路线详情</text>
      </svg>
      <div class="map-dots" id="mapDots"></div>
    </div>
  </div>
  <main class="grid" id="grid"></main>
  <div class="modal-overlay hidden" id="modal">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-color" id="modalColor"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <footer class="footer">安全第一 · 量力而行</footer>
  <script src="/js/hiking-data.js"></script>
  <script>
  (() => {
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
    html.dataset.theme = saved;
    const tb = document.getElementById('themeToggle');
    tb.textContent = saved==='dark'?'☀️':'🌙';
    tb.addEventListener('click', () => { const n = html.dataset.theme==='dark'?'light':'dark'; html.dataset.theme=n; localStorage.setItem('theme',n); tb.textContent=n==='dark'?'☀️':'🌙'; });

    const filters = document.getElementById('catFilters');
    const regions = [...new Set(TRAILS.map(t=>t.region))];
    regions.forEach(r => { const b=document.createElement('button'); b.className='cat-tag'; b.dataset.cat=r; b.textContent=`${REGION_EMOJI[r]||'🌍'} ${r}`; filters.appendChild(b); });

    let activeCat='all', activeDiff='all', activeDur='all', query='';

    function getDurCategory(dur) {
      if (!dur) return 'day';
      const match = dur.match(/(\d+)/);
      if (!match) return 'day';
      const num = parseInt(match[1]);
      if (dur.includes('小时') || (dur.includes('天') && num <= 1)) return 'day';
      if (num <= 4 && dur.includes('天')) return 'short';
      return 'long';
    }
    const grid=document.getElementById('grid'), countEl=document.getElementById('resultCount');

    function getFiltered() {
      return TRAILS.filter(t => {
        if (activeCat!=='all' && t.region!==activeCat) return false;
        if (activeDiff!=='all' && t.difficulty!==activeDiff) return false;
        if (activeDur!=='all' && getDurCategory(t.duration)!==activeDur) return false;
        if (query) { const q=query.toLowerCase(); if (!`${t.name} ${t.nameZh} ${t.region} ${t.country} ${t.highlights} ${t.difficulty}`.toLowerCase().includes(q)) return false; }
        return true;
      });
    }

    function render() {
      const res=getFiltered(); countEl.textContent=res.length;
      if(!res.length){grid.innerHTML='<div class="no-results">没有找到匹配的路线 🥾</div>';return}
      grid.innerHTML=res.map((t,i)=>`<div class="item-card" data-id="${t.id}" style="animation-delay:${Math.min(i*.03,.5)}s"><div class="card-color" style="background:${t.color}"></div><div class="card-body"><div class="card-emoji">${REGION_EMOJI[t.region]||'🌍'}</div><div class="card-name">${t.nameZh}</div><div class="card-zh">${t.name}</div><p class="card-desc">${t.highlights}</p><div class="card-footer"><span class="card-badge">${DIFFICULTY_LABELS[t.difficulty]}</span><span class="card-badge">${t.distance}</span><span class="card-badge">${t.duration}</span></div></div></div>`).join('');
      grid.querySelectorAll('.item-card').forEach(c=>c.addEventListener('click',()=>openModal(c.dataset.id)));
    }

    filters.addEventListener('click',e=>{const b=e.target.closest('.cat-tag');if(!b)return;activeCat=b.dataset.cat;filters.querySelectorAll('.cat-tag').forEach(x=>x.classList.toggle('active',x.dataset.cat===activeCat));render()});

    document.getElementById('diffFilters').addEventListener('click',e=>{const b=e.target.closest('.cat-tag');if(!b)return;activeDiff=b.dataset.diff;document.getElementById('diffFilters').querySelectorAll('.cat-tag').forEach(x=>x.classList.toggle('active',x.dataset.diff===activeDiff));render()});

    document.getElementById('durFilters').addEventListener('click',e=>{const b=e.target.closest('.cat-tag');if(!b)return;activeDur=b.dataset.dur;document.getElementById('durFilters').querySelectorAll('.cat-tag').forEach(x=>x.classList.toggle('active',x.dataset.dur===activeDur));render()});
    let st; document.getElementById('searchInput').addEventListener('input',e=>{clearTimeout(st);st=setTimeout(()=>{query=e.target.value.trim();render()},200)});

    const modal=document.getElementById('modal');
    function openModal(id){const t=TRAILS.find(x=>String(x.id)===String(id));if(!t)return;document.getElementById('modalColor').style.background=t.color;document.getElementById('modalBody').innerHTML=`<h2 class="modal-name">${t.nameZh}</h2><p class="modal-zh">${t.name} · ${t.country}</p><div class="modal-meta"><span>${REGION_EMOJI[t.region]} ${t.region}</span><span>📏 ${t.distance}</span><span>⏱️ ${t.duration}</span><span>⛰️ ${t.elevation}</span><span>📅 ${t.season}</span></div><p class="modal-desc">${t.highlights}</p><div class="modal-section"><h3>难度</h3><p>${DIFFICULTY_LABELS[t.difficulty]}</p></div><div class="modal-section"><h3>💡 实用建议</h3><p class="highlight">${t.tips}</p></div>`;modal.classList.remove('hidden');document.body.style.overflow='hidden'}
    document.getElementById('modalClose').addEventListener('click',()=>{modal.classList.add('hidden');document.body.style.overflow=''});
    modal.addEventListener('click',e=>{if(e.target===modal){modal.classList.add('hidden');document.body.style.overflow=''}});

    // Map dots
    const TRAIL_COORDS = {
      2:[700,160],4:[715,158],
      6:[530,180],7:[525,178],
      8:[155,160],9:[140,155],10:[210,155],11:[135,155],12:[138,158],
      13:[410,150],14:[385,155],15:[415,148],16:[410,158],17:[370,100],
      18:[745,330],19:[755,325],
      20:[215,290],21:[230,350],
      22:[600,180],23:[640,170],24:[625,175],
      25:[640,225],
      26:[475,255],
      27:[720,320],28:[410,145],29:[395,153],30:[415,152],
      31:[610,170],32:[605,175],33:[598,178],34:[635,173],
      35:[608,172],36:[620,162],37:[610,174]
    };

    const mapSvg = document.querySelector('.world-map');
    if (mapSvg) {
      Object.entries(TRAIL_COORDS).forEach(([id, [x, y]]) => {
        const trail = TRAILS.find(t => t.id === Number(id));
        if (!trail) return;
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', x);
        circle.setAttribute('cy', y);
        circle.setAttribute('r', '6');
        circle.setAttribute('fill', trail.color);
        circle.setAttribute('stroke', 'var(--bg-card,#fff)');
        circle.setAttribute('stroke-width', '2');
        circle.style.cursor = 'pointer';
        circle.style.transition = 'r 0.2s';
        circle.addEventListener('mouseenter', () => circle.setAttribute('r', '9'));
        circle.addEventListener('mouseleave', () => circle.setAttribute('r', '6'));
        circle.addEventListener('click', () => openModal(id));

        const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        title.textContent = trail.nameZh;
        circle.appendChild(title);
        mapSvg.appendChild(circle);
      });
    }
    render();
  })();
  </script>
</body>
</html>
