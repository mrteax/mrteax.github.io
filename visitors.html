<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>访客统计 · Tea X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/home.css">
</head>
<body>
  <main class="content vstats">
    <div class="vstats-head">
      <a href="/" class="vstats-back">← 返回主页</a>
      <div class="vstats-head-r">
        <span class="map-stat" id="mapStat">加载中…</span>
        <button class="vstats-export" id="exportCsv">⬇ 导出 CSV</button>
      </div>
    </div>
    <h1 class="vstats-title" id="visitorGreet">访客足迹</h1>

    <div class="vkpis" id="visitorKpis"></div>
    <div class="vinsights" id="visitorInsights"></div>

    <div class="vsec-head">
      <h2 class="section-label">世界足迹</h2>
      <div class="vrange" id="mapRangeBtns">
        <button data-mwin="all" class="active">全部</button>
        <button data-mwin="30">近30天</button>
        <button data-mwin="7">近7天</button>
      </div>
    </div>
    <section class="card visitor-card">
      <div class="visitor-map-wrap">
        <svg class="vmap" id="vmap" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" aria-label="访客地图">
          <rect width="800" height="400" rx="12" fill="var(--input)"/>
          <g fill="var(--abg)" stroke="var(--border)" stroke-width=".6">
            <path d="M50,55 L80,48 120,50 148,55 170,60 185,72 192,90 200,100 195,110 200,125 210,140 215,150 218,165 210,175 195,185 185,190 175,188 165,190 150,195 142,190 130,180 120,175 108,178 95,185 82,182 72,170 55,155 48,140 42,130 38,120 35,110 40,95 42,80 45,65 50,55Z"/>
            <path d="M150,195 L160,200 168,208 172,218 178,225 185,230 182,235 175,232 168,228 160,225 155,215 148,205 150,195Z"/>
            <path d="M185,230 L200,235 215,245 228,255 238,268 245,285 248,300 245,318 238,335 230,348 222,355 215,360 210,358 205,350 208,335 210,318 212,300 215,285 210,270 202,258 195,248 188,238 185,230Z"/>
            <path d="M370,60 L385,55 400,58 415,60 425,65 430,72 435,80 440,90 445,100 440,110 435,118 428,125 420,130 415,140 408,148 398,152 390,150 382,145 378,138 375,128 378,118 380,108 375,98 370,88 368,78 370,60Z"/>
            <path d="M365,80 L372,75 375,82 372,88 365,85Z"/>
            <path d="M400,30 L410,28 418,35 415,48 410,58 405,52 398,45 395,38 400,30Z"/>
            <path d="M350,48 L362,45 368,50 360,55 350,52Z"/>
            <path d="M398,160 L410,155 425,158 440,162 455,165 470,170 478,178 482,190 485,205 488,220 485,235 480,250 475,265 468,278 458,288 448,295 438,298 428,295 420,288 415,278 412,265 408,250 402,235 398,220 395,205 392,190 395,175 398,160Z"/>
            <path d="M445,50 L470,45 500,48 530,55 555,60 580,65 600,70 620,78 640,85 660,90 680,95 700,98 720,105 730,115 728,128 720,140 715,150 710,160 700,165 690,170 680,175 665,178 650,180 635,182 620,180 610,175 600,170 590,168 575,170 560,175 548,178 535,180 520,178 510,175 500,170 490,165 480,155 478,148 482,138 490,128 498,118 505,108 500,100 492,95 480,90 468,85 458,78 450,68 445,58Z"/>
            <path d="M718,135 L722,130 725,138 720,145 715,148 718,135Z"/>
            <path d="M535,180 L548,185 558,195 562,210 558,225 550,235 540,238 530,232 525,220 528,205 532,192Z"/>
            <path d="M620,200 L635,195 648,200 655,210 650,218 640,222 630,220 622,212Z"/>
            <path d="M625,230 L640,228 655,232 648,238 635,240 625,235Z"/>
            <path d="M660,235 L675,232 685,238 678,242 665,240Z"/>
            <path d="M680,285 L700,278 720,280 738,285 748,295 750,310 745,325 735,335 720,340 705,338 690,332 680,322 675,310 678,295Z"/>
            <path d="M758,320 L762,315 765,325 760,332 755,328Z"/>
            <path d="M280,20 L310,15 330,22 335,35 328,48 315,52 300,48 288,40 282,30Z"/>
          </g>
          <g id="vmapPins"></g>
        </svg>
      </div>
      <p class="visitor-note" id="visitorNote"></p>
    </section>

    <div class="vsec-head">
      <h2 class="section-label">每日到访趋势</h2>
      <div class="vrange" id="trendRangeBtns">
        <button data-win="30" class="active">30天</button>
        <button data-win="90">90天</button>
        <button data-win="all">全部</button>
      </div>
    </div>
    <div class="card vchart-card"><div id="visitorTrend"></div></div>

    <div class="vcols">
      <div class="vcol">
        <h2 class="section-label">新访客 vs 回访</h2>
        <div class="card vlist-card" id="visitorRetention"></div>
      </div>
      <div class="vcol">
        <h2 class="section-label">每周到访（近 8 周）</h2>
        <div class="card vchart-card"><div id="visitorWeekly"></div></div>
      </div>
    </div>

    <div class="vsec-head">
      <h2 class="section-label">时间段对比</h2>
      <div class="vrange" id="compareBtns">
        <button data-cw="7" class="active">本周 vs 上周</button>
        <button data-cw="30">近30天 vs 前30天</button>
      </div>
    </div>
    <div class="card vlist-card" id="visitorCompare"></div>

    <div class="vcols">
      <div class="vcol">
        <h2 class="section-label">来源构成</h2>
        <div class="card vlist-card" id="visitorCountries"></div>
      </div>
      <div class="vcol">
        <h2 class="section-label">到访最多的城市</h2>
        <ol class="vlist" id="visitorList"></ol>
      </div>
    </div>

    <div class="vcols">
      <div class="vcol">
        <h2 class="section-label">活跃星期</h2>
        <div class="card vchart-card"><div id="visitorWeekday"></div></div>
      </div>
      <div class="vcol">
        <h2 class="section-label">活跃时段（按小时）</h2>
        <div class="card vchart-card"><div id="visitorHours"></div></div>
      </div>
    </div>

    <h2 class="section-label">最近到访</h2>
    <ol class="vlist vlist-recent" id="visitorRecent"></ol>

    <h2 class="section-label">访客明细</h2>
    <div class="card vtable-card">
      <input class="vt-search" id="vtSearch" placeholder="🔍 搜索城市 / 国家…">
      <div class="vtable-scroll">
        <table class="vtable">
          <thead><tr><th>时间</th><th>位置</th><th>类型</th></tr></thead>
          <tbody id="vtBody"></tbody>
        </table>
      </div>
      <div class="vt-foot">
        <span id="vtInfo"></span>
        <div class="vt-pager"><button id="vtPrev" aria-label="上一页">‹</button><button id="vtNext" aria-label="下一页">›</button></div>
      </div>
    </div>
  </main>

  <script>
    (() => {
      const saved = localStorage.getItem('theme') ||
        (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = saved;
    })();
  </script>
  <script src="/js/visitor-map.js"></script>
</body>
</html>
